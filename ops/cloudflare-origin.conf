# Durcissement de l'origine derrière Cloudflare (reverse proxy OpenResty du Pi).
#
# À `include` dans CHAQUE bloc `server { ... }` HTTPS de l'origine :
#   - monitor.gautierchuinard.com      (front)
#   - api-monitor.gautierchuinard.com  (API — c'est là que tourne le rate-limit)
#
# Objectifs :
#   1. N'accepter QUE le trafic Cloudflare (Authenticated Origin Pulls / mTLS)
#      → ferme le bypass : taper l'IP du Pi en direct ne marche plus.
#   2. Reconstituer l'IP cliente réelle depuis CF-Connecting-IP, en ne s'y fiant
#      QUE depuis les plages IP de Cloudflare → l'app rate-limite sur une IP non
#      falsifiable (cf. api/rate_limit.py qui lit CF-Connecting-IP).
#
# Prérequis (une seule fois, voir ops/README.md) :
#   - télécharger la CA des certs client CF dans /etc/ssl/cloudflare/
#   - activer "Authenticated Origin Pulls" sur la zone (dashboard CF)

# ─── 1. Authenticated Origin Pulls : mTLS Cloudflare → origine ────────────────
# Rejette (HTTP 400) toute connexion ne présentant pas le certificat client CF.
ssl_client_certificate /etc/ssl/cloudflare/authenticated_origin_pull_ca.pem;
ssl_verify_client on;

# ─── 2. real_ip : ne faire confiance à CF-Connecting-IP QUE depuis les IP CF ──
# Liste régénérable via ops/refresh-cf-ips.sh (à jour au 2026-06-18).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# ─── 3. En-têtes transmis à l'upstream (à placer dans le bloc location/proxy) ──
# Après real_ip, $remote_addr = IP cliente réelle validée venant de CF. On force
# CF-Connecting-IP et X-Forwarded-For sur cette valeur de confiance → écrase toute
# chaîne XFF injectée par le client.
#   proxy_set_header Host              $host;
#   proxy_set_header CF-Connecting-IP  $remote_addr;
#   proxy_set_header X-Forwarded-For   $remote_addr;
#   proxy_set_header X-Forwarded-Proto $scheme;

# ─── 4. Hygiène ───────────────────────────────────────────────────────────────
server_tokens off;     # masque la bannière "openresty" (CWE-497)
# HSTS dupliqué : si l'upstream (conteneur nginx) ajoute déjà Strict-Transport-Security,
# ne pas le ré-ajouter ici. Avec le module headers-more, pour repartir propre :
#   more_clear_headers "Strict-Transport-Security";
#   more_set_headers   "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";
