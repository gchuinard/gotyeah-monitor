services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: monitor_api_dev
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    env_file:
      - .env.dev
    environment:
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monitor_dev_net

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: monitor_front_dev
    ports:
      - "5173:5173"
    volumes:
      - ./front:/app
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - monitor_dev_net

  db:
    image: mysql:8
    container_name: monitor_db_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - db_dev_data:/var/lib/mysql
    networks:
      - monitor_dev_net
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "monitor", "-pmonitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: monitor_mailpit_dev
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - monitor_dev_net

volumes:
  db_dev_data:

networks:
  monitor_dev_net:
    driver: bridge
