server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des assets texte
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # En-têtes de sécurité (Referrer-Policy limite la fuite des liens ?token= via Referer)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Assets immuables versionnés par Vite (hash dans le nom) : cache long.
    # NB : un `add_header` ici remplace ceux du bloc server (non hérités) — voulu,
    # ces fichiers n'ont pas besoin des en-têtes de sécurité du HTML.
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA : toute route inconnue (y compris /edit/:id) retombe sur le shell client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
