server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # N'expose pas la version de nginx (Server + corps des pages d'erreur) -> évite
    # de donner une cible de version précise (CWE-497).
    server_tokens off;

    # Compression des assets texte
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # En-têtes de sécurité, appliqués à TOUTES les réponses. NB nginx : une location qui
    # déclare son propre `add_header` n'hérite PLUS de ceux-ci -> on utilise `expires`
    # (et non add_header) pour le cache des assets, afin de garder ces en-têtes partout.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # CSP : SPA Svelte 100% same-origin. Scripts/styles inline (thème pré-paint + Svelte)
    # -> 'unsafe-inline' ; fetch vers l'API en connect-src. Aucune police/CDN externe.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://api-monitor.gautierchuinard.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    # Assets immuables versionnés par Vite (hash dans le nom) : cache long via `expires`
    # (pas add_header) pour HÉRITER des en-têtes de sécurité ci-dessus.
    location /_app/immutable/ {
        expires 1y;
        try_files $uri =404;
    }

    # SPA : toute route inconnue (y compris /edit/:id) retombe sur le shell client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
