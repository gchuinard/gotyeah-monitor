server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # N'expose pas la version de nginx (Server + corps des pages d'erreur) -> évite
    # de donner une cible de version précise (CWE-497).
    server_tokens off;

    # Compression des assets texte
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # En-têtes de sécurité, appliqués à TOUTES les réponses. NB nginx : une location qui
    # déclare son propre `add_header` n'hérite PLUS de ceux-ci -> on utilise `expires`
    # (et non add_header) pour le cache des assets, afin de garder ces en-têtes partout.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # La CSP stricte du HTML est dans une balise <meta> générée par SvelteKit (hash des
    # scripts inline, sans 'unsafe-inline' — voir svelte.config.js). Ici on ne met QUE des
    # directives sans script-src/default-src : ça (1) ne bloque pas les scripts inline
    # hashés du meta, (2) applique frame-ancestors (qui ne marche qu'en header, pas en
    # meta) et (3) donne une CSP de base aux réponses non-HTML (robots.txt...).
    add_header Content-Security-Policy "object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Assets immuables versionnés par Vite (hash dans le nom) : cache long via `expires`
    # (pas add_header) pour HÉRITER des en-têtes de sécurité ci-dessus.
    location /_app/immutable/ {
        expires 1y;
        try_files $uri =404;
    }

    # SPA : toute route inconnue (y compris /edit/:id) retombe sur le shell client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
