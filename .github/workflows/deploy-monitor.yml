name: Deploy GotYeah Monitor

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Mettre à jour le code et redémarrer le stack
        run: |
          cd /home/pi/sites/gotyeah-monitor
          git pull
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up -d --build