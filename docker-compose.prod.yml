services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: monitor_api_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # La DB est joignable via le nom de service sur monitor_net, pas via localhost.
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monitor_net
    expose:
      - "8000"

  front:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: monitor_front_prod
    restart: unless-stopped
    networks:
      - monitor_net
    expose:
      - "80"

  db:
    image: mysql:8
    container_name: monitor_db_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # L'image mysql ne crée la base/l'utilisateur que via les variables MYSQL_*.
      # On les dérive des DB_* déjà présentes dans .env (MYSQL_ROOT_PASSWORD à ajouter).
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - monitor_net
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:

networks:
  monitor_net:
    name: monitor_net
    external: true
