services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: monitor_api_prod
    restart: unless-stopped
    # Bornes au-dessus de l'usage normal : empêchent un emballement (fuite mémoire,
    # boucle) de saturer le Pi et d'OOM-kill l'hôte. À ajuster selon la RAM du Pi.
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    env_file:
      - .env
    environment:
      # La DB est joignable via le nom de service sur monitor_net, pas via localhost.
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monitor_net
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  front:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: monitor_front_prod
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 128
    networks:
      - monitor_net
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: mysql:8.4
    # Charset/collation explicites (= défaut MySQL 8.4) : indépendant de l'image.
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    container_name: monitor_db_prod
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 512
    env_file:
      - .env
    environment:
      # L'image mysql ne crée la base/l'utilisateur que via les variables MYSQL_*.
      # On les dérive des DB_* déjà présentes dans .env (MYSQL_ROOT_PASSWORD à ajouter).
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - monitor_net
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:

networks:
  monitor_net:
    name: monitor_net
    external: true
